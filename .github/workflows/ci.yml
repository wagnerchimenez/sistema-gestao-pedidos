name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ──────────────────────────────────────────────
  # Backend: lint + build
  # ──────────────────────────────────────────────
  backend:
    name: Backend — Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (TypeScript → dist)
        run: npm run build

  # ──────────────────────────────────────────────
  # Frontend: type-check + build
  # ──────────────────────────────────────────────
  frontend:
    name: Frontend — Type-check & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build (Vite)
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3001

  # ──────────────────────────────────────────────
  # Docker: build e push das imagens (só na main)
  # ──────────────────────────────────────────────
  docker:
    name: Docker — Build & Push
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e push — Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: runtime
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sgp-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/sgp-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build e push — Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sgp-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/sgp-frontend:${{ github.sha }}
          build-args: VITE_API_URL=${{ secrets.API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
