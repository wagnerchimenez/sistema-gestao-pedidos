name: Deploy — AWS ECS

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy para ECS (Fargate)
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    env:
      AWS_REGION: us-east-1
      ECR_REGISTRY: ${{ secrets.AWS_ECR_REGISTRY }}
      ECS_CLUSTER: sgp-cluster
      ECS_SERVICE_BACKEND: sgp-backend-service
      ECS_SERVICE_FRONTEND: sgp-frontend-service
      CONTAINER_BACKEND: sgp-backend
      CONTAINER_FRONTEND: sgp-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login no Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag e push — Backend para ECR
        id: build-backend
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build \
            --target runtime \
            -t $ECR_REGISTRY/$CONTAINER_BACKEND:$IMAGE_TAG \
            -t $ECR_REGISTRY/$CONTAINER_BACKEND:latest \
            ./backend
          docker push $ECR_REGISTRY/$CONTAINER_BACKEND:$IMAGE_TAG
          docker push $ECR_REGISTRY/$CONTAINER_BACKEND:latest
          echo "image=$ECR_REGISTRY/$CONTAINER_BACKEND:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Build, tag e push — Frontend para ECR
        id: build-frontend
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build \
            --build-arg VITE_API_URL=${{ secrets.API_URL }} \
            -t $ECR_REGISTRY/$CONTAINER_FRONTEND:$IMAGE_TAG \
            -t $ECR_REGISTRY/$CONTAINER_FRONTEND:latest \
            ./frontend
          docker push $ECR_REGISTRY/$CONTAINER_FRONTEND:$IMAGE_TAG
          docker push $ECR_REGISTRY/$CONTAINER_FRONTEND:latest
          echo "image=$ECR_REGISTRY/$CONTAINER_FRONTEND:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Atualizar task definition do Backend
        id: task-def-backend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: .aws/task-definition-backend.json
          container-name: ${{ env.CONTAINER_BACKEND }}
          image: ${{ steps.build-backend.outputs.image }}

      - name: Deploy Backend no ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def-backend.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_BACKEND }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Atualizar task definition do Frontend
        id: task-def-frontend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: .aws/task-definition-frontend.json
          container-name: ${{ env.CONTAINER_FRONTEND }}
          image: ${{ steps.build-frontend.outputs.image }}

      - name: Deploy Frontend no ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def-frontend.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_FRONTEND }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
